# ─── Appium Server ───────────────────────────────────────────────────────────
# Appium 2.x: no /wd/hub suffix.  For Appium 1.x use: http://127.0.0.1:4723/wd/hub
appium.url=http://127.0.0.1:4723

# ─── Device / Emulator ───────────────────────────────────────────────────────
# Run `adb devices` to confirm the exact serial / name
device.name=emulator-5554
platform.version=14.0

# ─── Application ─────────────────────────────────────────────────────────────
app.path=C:/Users/shiwa/Downloads/test_app.apk
app.package=com.example.myapp
app.activity=com.example.myapp.MainActivity

# ─── Waits (seconds) ─────────────────────────────────────────────────────────
implicit.wait=0
explicit.wait=15

# ─── Reset Strategy ──────────────────────────────────────────────────────────
no.reset=false
full.reset=false
